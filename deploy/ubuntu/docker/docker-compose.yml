services:
  mysql:
    image: mysql:8.4
    container_name: mainapi-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    env_file:
      - ./mainapi.docker.env
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-test} -p${MYSQL_PASSWORD:-1234} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  mainapi:
    image: eyesmanagement/mainapi:${MAINAPI_TAG:-latest}
    container_name: mainapi
    restart: unless-stopped
    env_file:
      - ./mainapi.docker.env
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${MAINAPI_PORT:-8080}:8080"

volumes:
  mysql_data:
