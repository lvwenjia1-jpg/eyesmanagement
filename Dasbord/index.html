<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        dark: '#0f172a'
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="flex flex-col md:flex-row min-h-screen">
        <aside class="bg-dark text-white w-full md:w-64 flex-shrink-0">
            <div class="p-4 flex items-center">
                <i class="fa fa-cogs text-2xl mr-2"></i>
                <h1 class="text-xl font-bold">管理系统</h1>
            </div>
            <nav class="mt-6 flex flex-col h-full">
                <a href="business.html" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-700 transition-all">
                    <i class="fa fa-dashboard mr-3"></i><span>上传概览</span>
                </a>
                <a href="orders.html" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-700 transition-all">
                    <i class="fa fa-list-alt mr-3"></i><span>上传记录</span>
                </a>
                <a href="index.html" class="flex items-center px-4 py-3 bg-primary text-white">
                    <i class="fa fa-users mr-3"></i><span>用户管理</span>
                </a>
                <a href="machine-codes.html" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-700 transition-all">
                    <i class="fa fa-key mr-3"></i><span>机器码管理</span>
                </a>
                <a href="#" id="logoutBtn" class="flex items-center px-4 py-3 text-slate-300 hover:bg-slate-700 transition-all mt-auto">
                    <i class="fa fa-sign-out mr-3"></i><span>退出登录</span>
                </a>
            </nav>
        </aside>

        <main class="flex-grow p-6">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">用户管理</h2>
                    <p class="text-slate-500 mt-1">接口地址：<span id="apiBaseUrlText"></span></p>
                </div>
                <button id="addUserBtn" class="bg-primary hover:bg-blue-700 text-white px-4 py-2 rounded-md">
                    <i class="fa fa-plus mr-2"></i>添加用户
                </button>
            </div>

            <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex flex-col md:flex-row gap-3">
                <input id="searchInput" type="text" placeholder="搜索账号、姓名、ERP、企业微信ID" class="flex-1 px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                <button id="refreshBtn" class="px-4 py-2 rounded-md bg-slate-200 hover:bg-slate-300 text-slate-700">刷新</button>
            </div>

            <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200">
                        <thead class="bg-slate-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">账号</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">姓名</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">ERP ID</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">企业微信ID</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">角色</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">状态</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">创建时间</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase">操作</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody" class="divide-y divide-slate-200"></tbody>
                    </table>
                </div>
                <div id="summaryText" class="px-6 py-3 text-sm text-slate-500 border-t border-slate-200"></div>
            </div>
        </main>
    </div>

    <div id="userModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-xl shadow-xl p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h3 id="modalTitle" class="text-lg font-bold text-slate-800">添加用户</h3>
                <button id="closeModal" class="text-slate-500 hover:text-slate-700"><i class="fa fa-times"></i></button>
            </div>
            <form id="userForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">账号</label>
                    <input id="username" type="text" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">姓名</label>
                    <input id="displayName" type="text" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">密码</label>
                    <input id="password" type="password" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                    <p class="text-xs text-slate-400 mt-1">编辑时留空表示不修改密码。</p>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">ERP ID</label>
                    <input id="erpId" type="text" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">企业微信ID</label>
                    <input id="wechatId" type="text" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">角色</label>
                        <select id="role" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="admin">admin</option>
                            <option value="user">user</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">状态</label>
                        <select id="isActive" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="true">启用</option>
                            <option value="false">停用</option>
                        </select>
                    </div>
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" id="cancelBtn" class="px-4 py-2 rounded-md bg-slate-200 hover:bg-slate-300 text-slate-700">取消</button>
                    <button type="submit" class="px-4 py-2 rounded-md bg-primary hover:bg-blue-700 text-white">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard-common.js"></script>
    <script>
        let users = [];
        let editingUser = null;

        const userTableBody = document.getElementById('userTableBody');
        const summaryText = document.getElementById('summaryText');
        const searchInput = document.getElementById('searchInput');
        const refreshBtn = document.getElementById('refreshBtn');
        const addUserBtn = document.getElementById('addUserBtn');
        const userModal = document.getElementById('userModal');
        const modalTitle = document.getElementById('modalTitle');
        const apiBaseUrlText = document.getElementById('apiBaseUrlText');
        const userForm = document.getElementById('userForm');

        function getFilteredUsers() {
            const keyword = searchInput.value.trim().toLowerCase();
            if (!keyword) {
                return users;
            }

            return users.filter(user =>
                user.loginName.toLowerCase().includes(keyword) ||
                user.displayName.toLowerCase().includes(keyword) ||
                user.erpId.toLowerCase().includes(keyword) ||
                user.wecomId.toLowerCase().includes(keyword)
            );
        }

        function renderUsers() {
            const rows = getFilteredUsers();
            userTableBody.innerHTML = rows.length
                ? rows.map(user => `
                    <tr class="hover:bg-slate-50">
                        <td class="px-6 py-4 text-sm text-slate-900">${dashboardApp.escapeHtml(user.loginName)}</td>
                        <td class="px-6 py-4 text-sm text-slate-600">${dashboardApp.escapeHtml(user.displayName)}</td>
                        <td class="px-6 py-4 text-sm text-slate-600">${dashboardApp.escapeHtml(user.erpId)}</td>
                        <td class="px-6 py-4 text-sm text-slate-600">${dashboardApp.escapeHtml(user.wecomId)}</td>
                        <td class="px-6 py-4 text-sm text-slate-600">${dashboardApp.escapeHtml(user.role)}</td>
                        <td class="px-6 py-4 text-sm ${user.isActive ? 'text-green-600' : 'text-red-600'}">${user.isActive ? '启用' : '停用'}</td>
                        <td class="px-6 py-4 text-sm text-slate-600">${dashboardApp.formatDateTime(user.createdAtUtc)}</td>
                        <td class="px-6 py-4 text-sm whitespace-nowrap">
                            <button class="text-primary hover:text-blue-800 mr-3" data-action="edit" data-id="${user.id}">编辑</button>
                            <button class="text-red-500 hover:text-red-700" data-action="delete" data-id="${user.id}">删除</button>
                        </td>
                    </tr>
                `).join('')
                : '<tr><td colspan="8" class="px-6 py-8 text-center text-slate-400">暂无用户数据</td></tr>';

            summaryText.textContent = `共 ${rows.length} 条记录`;
        }

        function openModal(user) {
            editingUser = user || null;
            modalTitle.textContent = user ? '编辑用户' : '添加用户';
            document.getElementById('username').value = user ? user.loginName : '';
            document.getElementById('displayName').value = user ? user.displayName : '';
            document.getElementById('password').value = '';
            document.getElementById('erpId').value = user ? user.erpId : '';
            document.getElementById('wechatId').value = user ? user.wecomId : '';
            document.getElementById('role').value = user ? user.role : 'user';
            document.getElementById('isActive').value = user ? String(user.isActive) : 'true';
            document.getElementById('username').disabled = Boolean(user);
            userModal.classList.remove('hidden');
            userModal.classList.add('flex');
        }

        function closeModal() {
            userModal.classList.add('hidden');
            userModal.classList.remove('flex');
            editingUser = null;
            userForm.reset();
        }

        async function loadUsers() {
            users = await dashboardApp.apiRequest('/api/users');
            renderUsers();
        }

        async function saveUser(event) {
            event.preventDefault();

            const payload = {
                displayName: document.getElementById('displayName').value.trim(),
                password: document.getElementById('password').value,
                erpId: document.getElementById('erpId').value.trim(),
                wecomId: document.getElementById('wechatId').value.trim(),
                role: document.getElementById('role').value,
                isActive: document.getElementById('isActive').value === 'true'
            };

            try {
                if (editingUser) {
                    await dashboardApp.apiRequest(`/api/users/${editingUser.id}`, {
                        method: 'PUT',
                        body: payload
                    });
                    dashboardApp.showToast('用户已更新');
                } else {
                    await dashboardApp.apiRequest('/api/users', {
                        method: 'POST',
                        body: {
                            loginName: document.getElementById('username').value.trim(),
                            displayName: payload.displayName,
                            password: payload.password,
                            erpId: payload.erpId,
                            wecomId: payload.wecomId,
                            role: payload.role
                        }
                    });
                    dashboardApp.showToast('用户已创建');
                }

                closeModal();
                await loadUsers();
            } catch (error) {
                dashboardApp.showToast(error.message || '保存失败', 'error');
            }
        }

        async function handleTableClick(event) {
            const action = event.target.dataset.action;
            const id = Number(event.target.dataset.id);
            if (!action || !id) {
                return;
            }

            const user = users.find(item => item.id === id);
            if (!user) {
                return;
            }

            if (action === 'edit') {
                openModal(user);
                return;
            }

            if (!confirm(`确定停用用户 ${user.loginName} 吗？`)) {
                return;
            }

            try {
                await dashboardApp.apiRequest(`/api/users/${id}`, { method: 'DELETE' });
                dashboardApp.showToast('用户已删除');
                await loadUsers();
            } catch (error) {
                dashboardApp.showToast(error.message || '删除失败', 'error');
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (!dashboardApp.requireAuth()) {
                return;
            }

            apiBaseUrlText.textContent = dashboardApp.getApiBaseUrl();

            try {
                await loadUsers();
            } catch (error) {
                dashboardApp.showToast(error.message || '加载用户失败', 'error');
            }
        });

        searchInput.addEventListener('input', renderUsers);
        refreshBtn.addEventListener('click', loadUsers);
        addUserBtn.addEventListener('click', () => openModal(null));
        document.getElementById('logoutBtn').addEventListener('click', dashboardApp.logout);
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('cancelBtn').addEventListener('click', closeModal);
        userForm.addEventListener('submit', saveUser);
        userTableBody.addEventListener('click', handleTableClick);
        userModal.addEventListener('click', event => {
            if (event.target === userModal) {
                closeModal();
            }
        });
    </script>
</body>
</html>
