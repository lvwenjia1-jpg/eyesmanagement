<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统登录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        dark: '#0f172a'
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-lg">
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="bg-dark text-white p-6">
                <h1 class="text-2xl font-bold">管理系统登录</h1>
                <p class="text-slate-300 mt-2">本地可配置接口地址，直接联调 MainApi。</p>
            </div>
            <div class="p-8">
                <form id="loginForm" class="space-y-5">
                    <div>
                        <label for="apiBaseUrl" class="block text-sm font-medium text-slate-700 mb-1">接口地址</label>
                        <input id="apiBaseUrl" type="text" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary" placeholder="http://127.0.0.1:5249">
                    </div>
                    <div>
                        <label for="machineCode" class="block text-sm font-medium text-slate-700 mb-1">机器码</label>
                        <input id="machineCode" type="text" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary" placeholder="DEMO-PC-001">
                    </div>
                    <div>
                        <label for="username" class="block text-sm font-medium text-slate-700 mb-1">账号</label>
                        <input id="username" type="text" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary" placeholder="admin">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 mb-1">密码</label>
                        <input id="password" type="password" required class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary" placeholder="123456">
                    </div>
                    <div id="errorMessage" class="hidden p-3 rounded-md bg-red-100 text-red-700 text-sm"></div>
                    <div class="flex gap-3">
                        <button type="submit" class="flex-1 bg-primary hover:bg-blue-700 text-white py-2 px-4 rounded-md transition-all">
                            <i class="fa fa-sign-in mr-2"></i>登录
                        </button>
                        <button type="button" id="fillDemoBtn" class="px-4 py-2 rounded-md bg-slate-200 hover:bg-slate-300 text-slate-700 transition-all">
                            演示值
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="dashboard-common.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const apiBaseUrlInput = document.getElementById('apiBaseUrl');
        const machineCodeInput = document.getElementById('machineCode');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const fillDemoBtn = document.getElementById('fillDemoBtn');

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
        }

        function fillDefaults() {
            apiBaseUrlInput.value = dashboardApp.getApiBaseUrl();
            machineCodeInput.value = sessionStorage.getItem('dashboard.machineCode') || 'DEMO-PC-001';
            usernameInput.value = 'admin';
            passwordInput.value = '123456';
        }

        async function handleLogin(event) {
            event.preventDefault();
            errorMessage.classList.add('hidden');

            dashboardApp.setApiBaseUrl(apiBaseUrlInput.value);

            try {
                const response = await dashboardApp.apiRequest('/api/auth/login', {
                    method: 'POST',
                    auth: false,
                    body: {
                        loginName: usernameInput.value.trim(),
                        password: passwordInput.value,
                        machineCode: machineCodeInput.value.trim()
                    }
                });

                dashboardApp.setAuthSession(response, machineCodeInput.value.trim());
                window.location.href = 'business.html';
            } catch (error) {
                showError(error.message || '登录失败。');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (dashboardApp.getToken()) {
                window.location.href = 'business.html';
                return;
            }

            fillDefaults();
        });

        loginForm.addEventListener('submit', handleLogin);
        fillDemoBtn.addEventListener('click', fillDefaults);
    </script>
</body>
</html>
