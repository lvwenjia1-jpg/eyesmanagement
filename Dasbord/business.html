<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>业务群管理</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#22c55e',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#0ea5e9',
                        light: '#f8fafc',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all {
                transition-property: all;
                transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
                transition-duration: 300ms;
            }
            .shadow-hover {
                @apply transition-all duration-300;
            }
            .shadow-hover:hover {
                @apply shadow-lg transform -translate-y-1;
            }
            .group-card {
                @apply bg-white rounded-lg shadow p-6 cursor-pointer transition-all duration-300;
            }
            .group-card:hover {
                @apply shadow-xl transform -translate-y-1;
            }
            .readonly-field {
                @apply bg-gray-100 text-gray-700 cursor-not-allowed border-gray-300;
            }
            .editable-field {
                @apply bg-white text-gray-900 border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- 侧边栏 -->
        <aside class="bg-dark text-white w-full md:w-64 flex-shrink-0">
            <div class="p-4 flex items-center justify-center md:justify-start">
                <i class="fa fa-cogs text-2xl mr-2"></i>
                <h1 class="text-xl font-bold">管理系统</h1>
            </div>
            <nav class="mt-6 flex flex-col h-full">
                <a href="index.html" class="flex items-center px-4 py-3 hover:bg-gray-700 text-gray-300 hover:text-white transition-all">
                    <i class="fa fa-users mr-3"></i>
                    <span>用户管理</span>
                </a>
                <a href="business.html" class="flex items-center px-4 py-3 bg-primary bg-opacity-80 text-white">
                    <i class="fa fa-shopping-bag mr-3"></i>
                    <span>业务群管理</span>
                </a>
                <a href="machine-codes.html" class="flex items-center px-4 py-3 hover:bg-gray-700 text-gray-300 hover:text-white transition-all">
                    <i class="fa fa-key mr-3"></i>
                    <span>机器码管理</span>
                </a>
                <a href="#" id="logoutBtn" class="flex items-center px-4 py-3 hover:bg-gray-700 text-gray-300 hover:text-white transition-all mt-auto">
                    <i class="fa fa-sign-out mr-3"></i>
                    <span>退出登录</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <main class="flex-grow p-6">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold text-gray-800">业务群管理</h2>
                <div class="flex items-center">
                    <span class="text-gray-600 mr-2">今日日期:</span>
                    <span class="font-medium" id="currentDate"></span>
                </div>
            </div>

            <!-- 业务群卡片列表 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="businessGroupsContainer">
                <!-- 业务群卡片将通过JavaScript动态填充 -->
            </div>
        </main>
    </div>

    <!-- 修改余额模态框 -->
    <div id="balanceModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-md">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">修改余额</h3>
                <button id="closeBalanceModal" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <form id="balanceForm">
                <input type="hidden" id="groupId">
                <div class="mb-4">
                    <label for="groupName" class="block text-sm font-medium text-gray-700 mb-1">业务群名称</label>
                    <input type="text" id="groupName" readonly
                        class="w-full px-4 py-2 border rounded-md readonly-field">
                </div>
                <div class="mb-6">
                    <label for="balance" class="block text-sm font-medium text-gray-700 mb-1">余额</label>
                    <input type="number" id="balance" name="balance" required min="0" step="0.01"
                        class="w-full px-4 py-2 border rounded-md editable-field">
                </div>
                <div class="flex justify-end">
                    <button type="button" id="cancelBalanceBtn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-md mr-2 transition-all">
                        取消
                    </button>
                    <button type="submit" class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-md transition-all">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 模拟业务群数据
        let businessGroups = [
            { id: 1, name: 'XXXXXA群', balance: 10005, orderCount: 200, orders: generateMockOrders('XXXXXA群') },
            { id: 2, name: 'XXXXXXXXXB群', balance: 15000, orderCount: 150, orders: generateMockOrders('XXXXXXXXXB群') },
            { id: 3, name: 'CCCCCC群', balance: 8500, orderCount: 120, orders: generateMockOrders('CCCCCC群') },
            { id: 4, name: 'DDDDDD群', balance: 12300, orderCount: 180, orders: generateMockOrders('DDDDDD群') },
            { id: 5, name: 'EEEEEE群', balance: 7600, orderCount: 95, orders: generateMockOrders('EEEEEE群') },
            { id: 6, name: 'FFFFFF群', balance: 18900, orderCount: 230, orders: generateMockOrders('FFFFFF群') }
        ];

        // 生成模拟订单数据
        function generateMockOrders(groupName) {
            const orders = [];
            const orderCount = Math.floor(Math.random() * 20) + 10; // 10-30个订单
            
            for (let i = 1; i <= orderCount; i++) {
                const products = [];
                const productCount = Math.floor(Math.random() * 3) + 1; // 1-3个商品
                
                for (let j = 1; j <= productCount; j++) {
                    products.push({
                        code: `P${Math.floor(Math.random() * 10000).toString().padStart(4, '0')}`,
                        name: `商品${j}`,
                        quantity: Math.floor(Math.random() * 5) + 1 // 1-5个数量
                    });
                }
                
                orders.push({
                    id: `ORD${Math.floor(Math.random() * 100000).toString().padStart(5, '0')}`,
                    recipient: `收件人${i}`,
                    address: `收货地址${i}号`,
                    products: products,
                    amount: Math.floor(Math.random() * 1000) + 100, // 100-1100元
                    trackingNumber: Math.random() > 0.5 ? `YT${Math.floor(Math.random() * 10000000000)}` : '',
                    uploader: `user${Math.floor(Math.random() * 5) + 1}` // 模拟上传人账号
                });
            }
            
            return orders;
        }

        // DOM 元素
        const businessGroupsContainer = document.getElementById('businessGroupsContainer');
        const balanceModal = document.getElementById('balanceModal');
        const closeBalanceModal = document.getElementById('closeBalanceModal');
        const cancelBalanceBtn = document.getElementById('cancelBalanceBtn');
        const balanceForm = document.getElementById('balanceForm');
        const currentDateEl = document.getElementById('currentDate');

        // 设置当前日期
        function setCurrentDate() {
            const now = new Date();
            const options = { year: 'numeric', month: '2-digit', day: '2-digit' };
            currentDateEl.textContent = now.toLocaleDateString('zh-CN', options);
        }

        // 渲染业务群卡片
        function renderBusinessGroups() {
            businessGroupsContainer.innerHTML = '';
            
            businessGroups.forEach(group => {
                const card = document.createElement('div');
                card.className = 'group-card';
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xl font-bold text-gray-800">${group.name}</h3>
                        <div class="text-2xl text-primary">
                            <i class="fa fa-shopping-cart"></i>
                        </div>
                    </div>
                    <div class="mb-4">
                        <div class="text-sm text-gray-500 mb-1">余额</div>
                        <div class="flex items-center">
                            <span class="text-2xl font-bold text-gray-800 balance-value">¥${group.balance.toLocaleString()}</span>
                            <button class="ml-2 text-primary hover:text-blue-700 edit-balance" data-id="${group.id}">
                                <i class="fa fa-pencil"></i>
                            </button>
                        </div>
                    </div>
                    <div>
                        <div class="text-sm text-gray-500 mb-1">今日订单量</div>
                        <div class="text-2xl font-bold text-gray-800">${group.orderCount}</div>
                    </div>
                    <div class="mt-4 pt-4 border-t border-gray-200">
                        <button class="w-full bg-primary hover:bg-blue-600 text-white py-2 rounded-md transition-all view-orders" data-id="${group.id}">
                            查看订单
                        </button>
                    </div>
                `;
                businessGroupsContainer.appendChild(card);

                // 添加双击事件
                card.addEventListener('dblclick', () => {
                    viewOrders(group.id);
                });
            });

            // 添加修改余额和查看订单按钮事件监听
            document.querySelectorAll('.edit-balance').forEach(btn => {
                btn.addEventListener('click', handleEditBalance);
            });

            document.querySelectorAll('.view-orders').forEach(btn => {
                btn.addEventListener('click', handleViewOrders);
            });
        }

        // 打开修改余额模态框
        function handleEditBalance(e) {
            e.stopPropagation(); // 阻止事件冒泡
            const groupId = parseInt(e.currentTarget.dataset.id);
            const group = businessGroups.find(g => g.id === groupId);
            
            if (group) {
                document.getElementById('groupId').value = group.id;
                document.getElementById('groupName').value = group.name;
                document.getElementById('balance').value = group.balance;
                balanceModal.classList.remove('hidden');
            }
        }

        // 关闭余额模态框
        function closeBalanceModalFunc() {
            balanceModal.classList.add('hidden');
        }

        // 处理余额表单提交
        function handleBalanceFormSubmit(e) {
            e.preventDefault();
            
            const groupId = parseInt(document.getElementById('groupId').value);
            const newBalance = parseFloat(document.getElementById('balance').value);
            
            if (isNaN(newBalance) || newBalance < 0) {
                alert('请输入有效的余额');
                return;
            }
            
            const groupIndex = businessGroups.findIndex(g => g.id === groupId);
            if (groupIndex !== -1) {
                businessGroups[groupIndex].balance = newBalance;
                renderBusinessGroups();
                closeBalanceModalFunc();
                showToast('余额已成功更新');
            }
        }

        // 查看订单
        function handleViewOrders(e) {
            const groupId = parseInt(e.currentTarget.dataset.id);
            viewOrders(groupId);
        }

        function viewOrders(groupId) {
            // 将选中的业务群ID存储在sessionStorage中，以便订单页面使用
            sessionStorage.setItem('selectedGroupId', groupId);
            // 跳转到订单页面
            window.location.href = 'orders.html';
        }

        // 退出登录
        function handleLogout() {
            if (confirm('确定要退出登录吗？')) {
                sessionStorage.removeItem('isLoggedIn');
                sessionStorage.removeItem('username');
                sessionStorage.removeItem('machineCode');
                window.location.href = 'login.html';
            }
        }

        // 显示提示消息
        function showToast(message) {
            // 创建提示元素
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-green-500 text-white px-4 py-2 rounded-md shadow-lg z-50 transition-all transform translate-y-0 opacity-0';
            toast.textContent = message;
            
            // 添加到页面
            document.body.appendChild(toast);
            
            // 显示动画
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-0');
                toast.classList.add('translate-y-0', 'opacity-100');
            }, 10);
            
            // 3秒后隐藏
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                toast.classList.add('opacity-0', 'translate-y-2');
                
                // 动画结束后移除元素
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // 事件监听
        closeBalanceModal.addEventListener('click', closeBalanceModalFunc);
        cancelBalanceBtn.addEventListener('click', closeBalanceModalFunc);
        balanceForm.addEventListener('submit', handleBalanceFormSubmit);
        document.getElementById('logoutBtn').addEventListener('click', handleLogout);

        // 点击模态框外部关闭
        balanceModal.addEventListener('click', (e) => {
            if (e.target === balanceModal) {
                closeBalanceModalFunc();
            }
        });

        // 检查登录状态
        function checkLoginStatus() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';
            if (!isLoggedIn) {
                window.location.href = 'login.html';
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            checkLoginStatus();
            setCurrentDate();
            renderBusinessGroups();
            
            // 将业务群数据存储在sessionStorage中，以便订单页面使用
            sessionStorage.setItem('businessGroups', JSON.stringify(businessGroups));
        });
    </script>
</body>
</html>
