<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>机器码管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        dark: '#0f172a'
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-slate-100 min-h-screen">
    <div class="min-h-screen flex">
        <aside class="w-64 bg-dark text-white hidden md:block">
            <div class="px-6 py-5 text-xl font-bold">MainApi Dashboard</div>
            <nav class="space-y-1 px-3">
                <a href="index.html" class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-200">用户管理</a>
                <a href="business.html" class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-200">订单中心</a>
                <a href="machine-codes.html" class="block px-3 py-2 rounded bg-primary text-white">机器码</a>
                <a href="#" id="logoutBtn" class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-200">退出登录</a>
            </nav>
        </aside>

        <main class="flex-1 p-6">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900">机器码管理</h1>
                    <p class="text-slate-500 mt-1">维护登录验证所需的机器码授权列表</p>
                </div>
                <div class="flex items-center gap-3">
                    <span id="apiBaseUrlText" class="text-sm text-slate-500"></span>
                    <button id="refreshBtn" class="px-4 py-2 rounded bg-slate-200 hover:bg-slate-300 text-slate-700">刷新</button>
                    <button id="addMachineCodeBtn" class="px-4 py-2 rounded bg-primary hover:bg-blue-700 text-white">新增机器码</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow p-4 mb-4">
                <div class="flex gap-3">
                    <input id="searchInput" type="text" placeholder="搜索机器码或描述" class="flex-1 px-4 py-2 border rounded-md" />
                </div>
            </div>

            <div class="bg-white rounded-xl shadow overflow-hidden">
                <div class="px-4 py-3 border-b text-sm text-slate-500" id="summaryText">加载中...</div>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-sm">
                        <thead class="bg-slate-50 text-slate-600">
                            <tr>
                                <th class="px-4 py-3 text-left">机器码</th>
                                <th class="px-4 py-3 text-left">描述</th>
                                <th class="px-4 py-3 text-left">状态</th>
                                <th class="px-4 py-3 text-left">创建时间</th>
                                <th class="px-4 py-3 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="machineCodesTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="machineCodeModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 id="modalTitle" class="text-lg font-bold text-slate-900">新增机器码</h2>
                <button id="closeModal" class="text-slate-400 hover:text-slate-700"><i class="fa fa-times"></i></button>
            </div>
            <form id="machineCodeForm" class="space-y-4">
                <div>
                    <label class="block text-sm text-slate-600 mb-1">机器码</label>
                    <input id="code" type="text" required class="w-full px-4 py-2 border rounded-md" />
                </div>
                <div>
                    <label class="block text-sm text-slate-600 mb-1">描述</label>
                    <input id="description" type="text" required class="w-full px-4 py-2 border rounded-md" />
                </div>
                <div>
                    <label class="block text-sm text-slate-600 mb-1">状态</label>
                    <select id="isActive" class="w-full px-4 py-2 border rounded-md">
                        <option value="true">启用</option>
                        <option value="false">停用</option>
                    </select>
                </div>
                <div class="flex justify-end gap-2 pt-2">
                    <button type="button" id="cancelBtn" class="px-4 py-2 rounded bg-slate-200 hover:bg-slate-300 text-slate-700">取消</button>
                    <button type="submit" class="px-4 py-2 rounded bg-primary hover:bg-blue-700 text-white">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard-common.js"></script>
    <script>
        let machines = [];
        let editingMachine = null;
        let currentUser = null;

        const tableBody = document.getElementById('machineCodesTableBody');
        const summaryText = document.getElementById('summaryText');
        const searchInput = document.getElementById('searchInput');
        const addBtn = document.getElementById('addMachineCodeBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const modal = document.getElementById('machineCodeModal');
        const modalTitle = document.getElementById('modalTitle');
        const form = document.getElementById('machineCodeForm');
        const apiBaseUrlText = document.getElementById('apiBaseUrlText');

        function isAdmin() {
            return currentUser && currentUser.role === 'admin';
        }

        function openModal(machine) {
            editingMachine = machine || null;
            modalTitle.textContent = machine ? '编辑机器码' : '新增机器码';
            document.getElementById('code').value = machine?.code || '';
            document.getElementById('description').value = machine?.description || '';
            document.getElementById('isActive').value = String(machine?.isActive ?? true);
            modal.classList.remove('hidden');
        }

        function closeModal() {
            editingMachine = null;
            modal.classList.add('hidden');
            form.reset();
            document.getElementById('isActive').value = 'true';
        }

        function getFilteredMachines() {
            const keyword = searchInput.value.trim().toLowerCase();
            if (!keyword) return machines;
            return machines.filter(item =>
                item.code.toLowerCase().includes(keyword) ||
                item.description.toLowerCase().includes(keyword));
        }

        function renderTable() {
            const rows = getFilteredMachines();
            summaryText.textContent = `共 ${rows.length} 条机器码记录`;
            tableBody.innerHTML = rows.length ? rows.map(item => `
                <tr class="border-t hover:bg-slate-50">
                    <td class="px-4 py-3">${dashboardApp.escapeHtml(item.code)}</td>
                    <td class="px-4 py-3">${dashboardApp.escapeHtml(item.description)}</td>
                    <td class="px-4 py-3 ${item.isActive ? 'text-green-600' : 'text-red-600'}">${item.isActive ? '启用' : '停用'}</td>
                    <td class="px-4 py-3">${dashboardApp.formatDateTime(item.createdAtUtc)}</td>
                    <td class="px-4 py-3 text-right">
                        ${isAdmin() ? `
                            <button data-action="edit" data-id="${item.id}" class="px-3 py-1 text-primary hover:text-blue-700">编辑</button>
                            <button data-action="delete" data-id="${item.id}" class="px-3 py-1 text-red-500 hover:text-red-700">停用</button>
                        ` : '<span class="text-slate-400">只读</span>'}
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="5" class="px-4 py-8 text-center text-slate-400">暂无数据</td></tr>';
        }

        async function loadMachines() {
            machines = await dashboardApp.apiRequest('/api/machines');
            renderTable();
        }

        async function saveMachine(event) {
            event.preventDefault();
            const payload = {
                code: document.getElementById('code').value.trim(),
                description: document.getElementById('description').value.trim(),
                isActive: document.getElementById('isActive').value === 'true'
            };

            if (editingMachine) {
                await dashboardApp.apiRequest(`/api/machines/${editingMachine.id}`, {
                    method: 'PUT',
                    body: payload
                });
                dashboardApp.showToast('机器码已更新');
            } else {
                await dashboardApp.apiRequest('/api/machines', {
                    method: 'POST',
                    body: payload
                });
                dashboardApp.showToast('机器码已创建');
            }

            closeModal();
            await loadMachines();
        }

        async function handleTableClick(event) {
            const button = event.target.closest('button[data-action]');
            if (!button) return;

            const id = Number(button.dataset.id);
            const action = button.dataset.action;
            const machine = machines.find(item => item.id === id);
            if (!machine) return;

            if (action === 'edit') {
                openModal(machine);
                return;
            }

            if (action === 'delete' && confirm(`确认停用机器码 ${machine.code}？`)) {
                await dashboardApp.apiRequest(`/api/machines/${id}`, { method: 'DELETE' });
                dashboardApp.showToast('机器码已停用');
                await loadMachines();
            }
        }

        async function init() {
            if (!dashboardApp.requireAuth()) return;
            currentUser = dashboardApp.getCurrentUser();
            apiBaseUrlText.textContent = dashboardApp.getApiBaseUrl();
            addBtn.disabled = !isAdmin();
            addBtn.classList.toggle('opacity-50', !isAdmin());
            await loadMachines();
        }

        addBtn.addEventListener('click', () => isAdmin() && openModal());
        refreshBtn.addEventListener('click', loadMachines);
        searchInput.addEventListener('input', renderTable);
        form.addEventListener('submit', saveMachine);
        tableBody.addEventListener('click', event => handleTableClick(event).catch(error => dashboardApp.showToast(error.message, 'error')));
        document.getElementById('closeModal').addEventListener('click', closeModal);
        document.getElementById('cancelBtn').addEventListener('click', closeModal);
        document.getElementById('logoutBtn').addEventListener('click', dashboardApp.logout);
        modal.addEventListener('click', event => {
            if (event.target === modal) closeModal();
        });

        init().catch(error => {
            summaryText.textContent = '加载失败';
            dashboardApp.showToast(error.message, 'error');
        });
    </script>
</body>
</html>
