<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        dark: '#0f172a'
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-slate-100 min-h-screen">
    <div class="min-h-screen flex">
        <aside class="w-64 bg-dark text-white hidden md:block">
            <div class="px-6 py-5 text-xl font-bold">MainApi Dashboard</div>
            <nav class="space-y-1 px-3">
                <a href="index.html" class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-200">用户管理</a>
                <a href="business.html" class="block px-3 py-2 rounded bg-primary text-white">订单中心</a>
                <a href="machine-codes.html" class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-200">机器码</a>
                <a href="#" id="logoutBtn" class="block px-3 py-2 rounded hover:bg-slate-700 text-slate-200">退出登录</a>
            </nav>
        </aside>

        <main class="flex-1 p-6">
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-slate-900">订单中心</h1>
                    <p class="text-slate-500 mt-1">查看上传订单记录、按上传人/机器码/状态筛选并查看详情</p>
                </div>
                <div class="flex items-center gap-3">
                    <span id="apiBaseUrlText" class="text-sm text-slate-500"></span>
                    <button id="refreshBtn" class="px-4 py-2 rounded bg-slate-200 hover:bg-slate-300 text-slate-700">刷新</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow p-4 mb-4 grid grid-cols-1 md:grid-cols-6 gap-3">
                <div>
                    <label class="block text-xs text-slate-500 mb-1">开始日期</label>
                    <input id="dateFrom" type="date" class="w-full px-3 py-2 border rounded-md" />
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">结束日期</label>
                    <input id="dateTo" type="date" class="w-full px-3 py-2 border rounded-md" />
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">状态</label>
                    <input id="statusFilter" type="text" placeholder="如：上传成功" class="w-full px-3 py-2 border rounded-md" />
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">机器码</label>
                    <input id="machineCodeFilter" type="text" class="w-full px-3 py-2 border rounded-md" />
                </div>
                <div>
                    <label class="block text-xs text-slate-500 mb-1">上传人账号</label>
                    <input id="uploaderFilter" type="text" class="w-full px-3 py-2 border rounded-md" />
                </div>
                <div class="flex items-end gap-2">
                    <button id="filterBtn" class="flex-1 px-4 py-2 rounded bg-primary hover:bg-blue-700 text-white">筛选</button>
                    <button id="resetBtn" class="px-4 py-2 rounded bg-slate-200 hover:bg-slate-300 text-slate-700">重置</button>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow overflow-hidden">
                <div class="px-4 py-3 border-b flex items-center justify-between">
                    <div id="summaryText" class="text-sm text-slate-500">加载中...</div>
                    <div class="flex items-center gap-2 text-sm">
                        <button id="prevPageBtn" class="px-3 py-1 rounded bg-slate-200 hover:bg-slate-300 text-slate-700">上一页</button>
                        <span id="pageInfo" class="text-slate-500">-</span>
                        <button id="nextPageBtn" class="px-3 py-1 rounded bg-slate-200 hover:bg-slate-300 text-slate-700">下一页</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full text-sm">
                        <thead class="bg-slate-50 text-slate-600">
                            <tr>
                                <th class="px-4 py-3 text-left">上传单号</th>
                                <th class="px-4 py-3 text-left">订单号</th>
                                <th class="px-4 py-3 text-left">上传人</th>
                                <th class="px-4 py-3 text-left">机器码</th>
                                <th class="px-4 py-3 text-left">收件人</th>
                                <th class="px-4 py-3 text-left">商品数</th>
                                <th class="px-4 py-3 text-left">状态</th>
                                <th class="px-4 py-3 text-left">创建时间</th>
                                <th class="px-4 py-3 text-right">操作</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div id="detailModal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-5xl max-h-[90vh] overflow-auto p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-slate-900">订单详情</h2>
                <button id="closeDetailBtn" class="text-slate-400 hover:text-slate-700"><i class="fa fa-times"></i></button>
            </div>
            <div id="detailContent" class="space-y-4 text-sm text-slate-700"></div>
        </div>
    </div>

    <script src="dashboard-common.js"></script>
    <script>
        let currentUser = null;
        let pageNumber = 1;
        const pageSize = 20;
        let lastResult = null;

        const summaryText = document.getElementById('summaryText');
        const pageInfo = document.getElementById('pageInfo');
        const tableBody = document.getElementById('ordersTableBody');
        const detailModal = document.getElementById('detailModal');
        const detailContent = document.getElementById('detailContent');

        function getFilters() {
            return {
                pageNumber,
                pageSize,
                dateFrom: document.getElementById('dateFrom').value || undefined,
                dateTo: document.getElementById('dateTo').value || undefined,
                status: document.getElementById('statusFilter').value.trim() || undefined,
                machineCode: document.getElementById('machineCodeFilter').value.trim() || undefined,
                uploaderLoginName: document.getElementById('uploaderFilter').value.trim() || undefined
            };
        }

        function buildQuery(filters) {
            const params = new URLSearchParams();
            Object.entries(filters).forEach(([key, value]) => {
                if (value !== undefined && value !== null && value !== '') {
                    params.set(key, value);
                }
            });
            return params.toString();
        }

        function renderRows(items) {
            tableBody.innerHTML = items.length ? items.map(item => `
                <tr class="border-t hover:bg-slate-50">
                    <td class="px-4 py-3">${dashboardApp.escapeHtml(item.uploadNo)}</td>
                    <td class="px-4 py-3">${dashboardApp.escapeHtml(item.orderNumber || '-')}</td>
                    <td class="px-4 py-3">${dashboardApp.escapeHtml(item.uploaderDisplayName || item.uploaderLoginName)}</td>
                    <td class="px-4 py-3">${dashboardApp.escapeHtml(item.machineCode || '-')}</td>
                    <td class="px-4 py-3">${dashboardApp.escapeHtml(item.receiverName)}</td>
                    <td class="px-4 py-3">${item.itemCount}</td>
                    <td class="px-4 py-3 ${String(item.status).includes('成功') ? 'text-green-600' : String(item.status).includes('失败') ? 'text-red-600' : 'text-slate-600'}">${dashboardApp.escapeHtml(item.status)}</td>
                    <td class="px-4 py-3">${dashboardApp.formatDateTime(item.createdAtUtc)}</td>
                    <td class="px-4 py-3 text-right">
                        <button data-id="${item.id}" class="detail-btn px-3 py-1 text-primary hover:text-blue-700">详情</button>
                    </td>
                </tr>
            `).join('') : '<tr><td colspan="9" class="px-4 py-8 text-center text-slate-400">暂无订单记录</td></tr>';
        }

        function renderPager(result) {
            const totalPages = Math.max(1, Math.ceil(result.totalCount / result.pageSize));
            pageInfo.textContent = `第 ${result.pageNumber} / ${totalPages} 页，共 ${result.totalCount} 条`;
            document.getElementById('prevPageBtn').disabled = result.pageNumber <= 1;
            document.getElementById('nextPageBtn').disabled = result.pageNumber >= totalPages;
        }

        async function loadOrders() {
            const query = buildQuery(getFilters());
            const result = await dashboardApp.apiRequest(`/api/uploads/paged?${query}`);
            lastResult = result;
            renderRows(result.items || []);
            renderPager(result);
            summaryText.textContent = currentUser?.role === 'admin'
                ? `管理员视角，当前返回 ${result.items.length} 条记录`
                : `当前仅展示你的订单，返回 ${result.items.length} 条记录`;
        }

        async function openDetail(id) {
            const detail = await dashboardApp.apiRequest(`/api/uploads/${id}`);
            detailContent.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div><span class="text-slate-400">上传单号：</span>${dashboardApp.escapeHtml(detail.uploadNo)}</div>
                    <div><span class="text-slate-400">订单号：</span>${dashboardApp.escapeHtml(detail.orderNumber || '-')}</div>
                    <div><span class="text-slate-400">上传人：</span>${dashboardApp.escapeHtml(detail.uploaderDisplayName || detail.uploaderLoginName)}</div>
                    <div><span class="text-slate-400">机器码：</span>${dashboardApp.escapeHtml(detail.machineCode || '-')}</div>
                    <div><span class="text-slate-400">收件人：</span>${dashboardApp.escapeHtml(detail.receiverName)}</div>
                    <div><span class="text-slate-400">手机：</span>${dashboardApp.escapeHtml(detail.receiverMobile)}</div>
                    <div class="md:col-span-2"><span class="text-slate-400">地址：</span>${dashboardApp.escapeHtml(detail.receiverAddress)}</div>
                    <div><span class="text-slate-400">状态：</span>${dashboardApp.escapeHtml(detail.status)}</div>
                    <div><span class="text-slate-400">创建时间：</span>${dashboardApp.formatDateTime(detail.createdAtUtc)}</div>
                    <div class="md:col-span-2"><span class="text-slate-400">备注：</span>${dashboardApp.escapeHtml(detail.remark || '-')}</div>
                </div>
                <div>
                    <h3 class="font-semibold text-slate-900 mb-2">商品明细</h3>
                    <div class="overflow-x-auto border rounded-lg">
                        <table class="min-w-full text-sm">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th class="px-3 py-2 text-left">商品编码</th>
                                    <th class="px-3 py-2 text-left">商品名称</th>
                                    <th class="px-3 py-2 text-left">度数</th>
                                    <th class="px-3 py-2 text-left">周期</th>
                                    <th class="px-3 py-2 text-left">数量</th>
                                    <th class="px-3 py-2 text-left">备注</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${(detail.items || []).map(item => `
                                    <tr class="border-t">
                                        <td class="px-3 py-2">${dashboardApp.escapeHtml(item.productCode)}</td>
                                        <td class="px-3 py-2">${dashboardApp.escapeHtml(item.productName || '-')}</td>
                                        <td class="px-3 py-2">${dashboardApp.escapeHtml(item.degreeText || '-')}</td>
                                        <td class="px-3 py-2">${dashboardApp.escapeHtml(item.wearPeriod || '-')}</td>
                                        <td class="px-3 py-2">${item.quantity}</td>
                                        <td class="px-3 py-2">${dashboardApp.escapeHtml(item.remark || '-')}</td>
                                    </tr>
                                `).join('') || '<tr><td colspan="6" class="px-3 py-6 text-center text-slate-400">无商品明细</td></tr>'}
                            </tbody>
                        </table>
                    </div>
                </div>
                <div>
                    <h3 class="font-semibold text-slate-900 mb-2">接口报文</h3>
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-3">
                        <pre class="bg-slate-900 text-slate-100 rounded-lg p-3 overflow-auto whitespace-pre-wrap">${dashboardApp.escapeHtml(detail.externalRequestJson || '')}</pre>
                        <pre class="bg-slate-900 text-slate-100 rounded-lg p-3 overflow-auto whitespace-pre-wrap">${dashboardApp.escapeHtml(detail.externalResponseJson || '')}</pre>
                    </div>
                </div>
            `;
            detailModal.classList.remove('hidden');
        }

        function resetFilters() {
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateTo').value = '';
            document.getElementById('statusFilter').value = '';
            document.getElementById('machineCodeFilter').value = '';
            document.getElementById('uploaderFilter').value = '';
            pageNumber = 1;
        }

        async function init() {
            if (!dashboardApp.requireAuth()) return;
            currentUser = dashboardApp.getCurrentUser();
            document.getElementById('apiBaseUrlText').textContent = dashboardApp.getApiBaseUrl();
            if (currentUser?.role !== 'admin') {
                const uploaderInput = document.getElementById('uploaderFilter');
                uploaderInput.value = currentUser?.loginName || '';
                uploaderInput.disabled = true;
                uploaderInput.classList.add('bg-slate-100');
            }
            await loadOrders();
        }

        document.getElementById('refreshBtn').addEventListener('click', () => loadOrders().catch(error => dashboardApp.showToast(error.message, 'error')));
        document.getElementById('filterBtn').addEventListener('click', () => { pageNumber = 1; loadOrders().catch(error => dashboardApp.showToast(error.message, 'error')); });
        document.getElementById('resetBtn').addEventListener('click', () => { resetFilters(); loadOrders().catch(error => dashboardApp.showToast(error.message, 'error')); });
        document.getElementById('prevPageBtn').addEventListener('click', () => {
            if (pageNumber > 1) {
                pageNumber -= 1;
                loadOrders().catch(error => dashboardApp.showToast(error.message, 'error'));
            }
        });
        document.getElementById('nextPageBtn').addEventListener('click', () => {
            if (lastResult && pageNumber < Math.ceil(lastResult.totalCount / lastResult.pageSize)) {
                pageNumber += 1;
                loadOrders().catch(error => dashboardApp.showToast(error.message, 'error'));
            }
        });
        tableBody.addEventListener('click', event => {
            const button = event.target.closest('.detail-btn');
            if (!button) return;
            openDetail(Number(button.dataset.id)).catch(error => dashboardApp.showToast(error.message, 'error'));
        });
        document.getElementById('closeDetailBtn').addEventListener('click', () => detailModal.classList.add('hidden'));
        detailModal.addEventListener('click', event => {
            if (event.target === detailModal) detailModal.classList.add('hidden');
        });
        document.getElementById('logoutBtn').addEventListener('click', dashboardApp.logout);

        init().catch(error => {
            summaryText.textContent = '加载失败';
            dashboardApp.showToast(error.message, 'error');
        });
    </script>
</body>
</html>
