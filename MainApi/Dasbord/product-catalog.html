<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品编码管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#22c55e',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#0ea5e9',
                        light: '#f8fafc',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .transition-all {
                transition-property: all;
                transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
                transition-duration: 300ms;
            }
            .editable-field {
                @apply bg-white text-gray-900 border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex flex-col md:flex-row min-h-screen">
        <aside id="dashboardSidebar" class="bg-dark text-white w-full md:w-64 flex-shrink-0"></aside><!--
            <div class="p-4 flex items-center justify-center md:justify-start">
                <i class="fa fa-cogs text-2xl mr-2"></i>
                <h1 class="text-xl font-bold">管理系统</h1>
            </div>
            <nav class="mt-6 flex flex-col h-full">
                <a href="index.html" class="flex items-center px-4 py-3 hover:bg-gray-700 text-gray-300 hover:text-white transition-all">
                    <i class="fa fa-users mr-3"></i>
                    <span>用户管理</span>
                </a>
                <a href="business.html" class="flex items-center px-4 py-3 hover:bg-gray-700 text-gray-300 hover:text-white transition-all">
                    <i class="fa fa-shopping-bag mr-3"></i>
                    <span>业务群管理</span>
                </a>
                <a href="price-rules.html" class="flex items-center px-4 py-3 hover:bg-gray-700 text-gray-300 hover:text-white transition-all">
                    <i class="fa fa-tags mr-3"></i>
                    <span>价格管理</span>
                </a>
                <a href="product-catalog.html" class="flex items-center px-4 py-3 bg-primary bg-opacity-80 text-white">
                    <i class="fa fa-barcode mr-3"></i>
                    <span>商品编码管理</span>
                </a>
                <a href="machine-codes.html" class="flex items-center px-4 py-3 hover:bg-gray-700 text-gray-300 hover:text-white transition-all">
                    <i class="fa fa-key mr-3"></i>
                    <span>机器码管理</span>
                </a>
                <a href="#" id="logoutBtn" class="flex items-center px-4 py-3 hover:bg-gray-700 text-gray-300 hover:text-white transition-all mt-auto">
                    <i class="fa fa-sign-out mr-3"></i>
                    <span>退出登录</span>
                </a>
            </nav>
        -->

        <main class="flex-grow p-6">
            <div class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-4 mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">商品编码管理</h2>
                    <p class="text-gray-600 mt-1">浏览商品目录，并通过批量替换方式维护完整商品编码表。</p>
                </div>
                <div class="flex flex-wrap items-center gap-3">
                    <div class="text-sm text-gray-500 hidden md:block">
                        当前登录：<span id="currentLoginName" class="font-medium text-gray-700">-</span>
                    </div>
                    <button id="exportBtn" class="bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 px-4 py-2 rounded-md flex items-center transition-all shadow-sm">
                        <i class="fa fa-download mr-2"></i> 导出当前目录
                    </button>
                    <button id="replaceBtn" class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-md flex items-center transition-all shadow-sm">
                        <i class="fa fa-upload mr-2"></i> 批量替换目录
                    </button>
                </div>
            </div>

            <section class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-white rounded-lg shadow p-5">
                    <div class="text-sm text-gray-500">当前页记录</div>
                    <div id="pageCountCard" class="text-3xl font-bold text-gray-800 mt-2">0</div>
                    <div class="text-xs text-gray-400 mt-2">本页已加载的商品编码数量</div>
                </div>
                <div class="bg-white rounded-lg shadow p-5">
                    <div class="text-sm text-gray-500">目录总数</div>
                    <div id="totalCountCard" class="text-3xl font-bold text-primary mt-2">0</div>
                    <div class="text-xs text-gray-400 mt-2">按当前筛选条件统计</div>
                </div>
                <div class="bg-white rounded-lg shadow p-5">
                    <div class="text-sm text-gray-500">最近更新时间</div>
                    <div id="lastUpdatedCard" class="text-base font-semibold text-gray-800 mt-2">-</div>
                    <div class="text-xs text-gray-400 mt-2">当前页最新一条记录的更新时间</div>
                </div>
            </section>

            <section class="bg-white p-4 rounded-lg shadow mb-6">
                <div class="grid grid-cols-1 lg:grid-cols-6 gap-4">
                    <div class="lg:col-span-2">
                        <label for="keywordInput" class="block text-sm font-medium text-gray-700 mb-1">综合搜索</label>
                        <input type="text" id="keywordInput" placeholder="编码、名称、条码、周期、型号"
                               class="w-full px-4 py-2 border rounded-md editable-field">
                    </div>
                    <div>
                        <label for="productCodeInput" class="block text-sm font-medium text-gray-700 mb-1">商品编码</label>
                        <input type="text" id="productCodeInput" placeholder="支持模糊匹配"
                               class="w-full px-4 py-2 border rounded-md editable-field">
                    </div>
                    <div>
                        <label for="productNameInput" class="block text-sm font-medium text-gray-700 mb-1">商品名称</label>
                        <input type="text" id="productNameInput" placeholder="支持模糊匹配"
                               class="w-full px-4 py-2 border rounded-md editable-field">
                    </div>
                    <div>
                        <label for="specificationInput" class="block text-sm font-medium text-gray-700 mb-1">规格/周期</label>
                        <input type="text" id="specificationInput" placeholder="如：日抛2片"
                               class="w-full px-4 py-2 border rounded-md editable-field">
                    </div>
                    <div>
                        <label for="modelTokenInput" class="block text-sm font-medium text-gray-700 mb-1">型号标签</label>
                        <input type="text" id="modelTokenInput" placeholder="如：lenspop日抛"
                               class="w-full px-4 py-2 border rounded-md editable-field">
                    </div>
                    <div>
                        <label for="degreeInput" class="block text-sm font-medium text-gray-700 mb-1">度数</label>
                        <input type="text" id="degreeInput" placeholder="如：350"
                               class="w-full px-4 py-2 border rounded-md editable-field">
                    </div>
                </div>
                <div class="flex flex-wrap items-center gap-3 mt-4">
                    <button id="searchBtn" class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-md transition-all">
                        <i class="fa fa-search mr-2"></i> 查询
                    </button>
                    <button id="resetBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-md transition-all">
                        <i class="fa fa-refresh mr-2"></i> 重置
                    </button>
                </div>
            </section>

            <section class="bg-white rounded-lg shadow overflow-hidden">
                <div class="px-4 py-3 border-b border-gray-200 flex items-center justify-between">
                    <div class="text-sm text-gray-600">商品编码列表</div>
                    <div id="loadingHint" class="text-sm text-gray-400 hidden">正在加载...</div>
                </div>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">商品编码</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">商品名称</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">规格编码</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">条码</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">规格</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">型号标签</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">度数</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">更新时间</th>
                            </tr>
                        </thead>
                        <tbody id="catalogTableBody" class="bg-white divide-y divide-gray-200"></tbody>
                    </table>
                </div>
                <div class="bg-white px-4 py-3 border-t border-gray-200">
                    <div class="flex flex-col gap-3 sm:hidden">
                        <div id="mobilePageInfo" class="text-sm text-gray-700"></div>
                        <div class="flex justify-between">
                            <button id="mobilePrevBtn" class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                                上一页
                            </button>
                            <button id="mobileNextBtn" class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                                下一页
                            </button>
                        </div>
                    </div>
                    <div class="hidden sm:flex sm:items-center sm:justify-between">
                        <div id="pageInfo" class="text-sm text-gray-700"></div>
                        <div id="pagination"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div id="replaceModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-5xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-start mb-4">
                <div>
                    <h3 class="text-lg font-bold text-gray-800">批量替换商品目录</h3>
                    <p class="text-sm text-gray-500 mt-1">提交后会覆盖当前全部商品编码，请先确认 JSON 内容无误。</p>
                </div>
                <button id="closeModal" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times"></i>
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4">
                <div class="lg:col-span-2">
                    <label for="sourceFileNameInput" class="block text-sm font-medium text-gray-700 mb-1">来源文件名</label>
                    <input type="text" id="sourceFileNameInput" placeholder="例如：product-catalog.json / 商品目录-20260419.xlsx"
                           class="w-full px-4 py-2 border rounded-md editable-field">
                </div>
                <div class="flex items-end gap-3">
                    <button id="loadCurrentBtn" type="button" class="bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 px-4 py-2 rounded-md transition-all">
                        载入当前目录
                    </button>
                    <button id="loadExampleBtn" type="button" class="bg-white hover:bg-gray-50 text-gray-700 border border-gray-300 px-4 py-2 rounded-md transition-all">
                        填入示例
                    </button>
                </div>
            </div>

            <div class="flex flex-wrap items-center gap-3 mb-3">
                <button id="formatJsonBtn" type="button" class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-3 py-2 rounded-md transition-all">
                    <i class="fa fa-code mr-2"></i> 格式化 JSON
                </button>
                <div class="text-sm text-gray-500">
                    支持直接粘贴 JSON 数组，或 `{ "entries": [...] }` 结构。
                </div>
            </div>

            <div class="mb-4">
                <label for="catalogJsonInput" class="block text-sm font-medium text-gray-700 mb-1">商品目录 JSON</label>
                <textarea id="catalogJsonInput" rows="20"
                          class="w-full px-4 py-3 border rounded-md font-mono text-sm editable-field"
                          placeholder='[
  {
    "productCode": "日抛2片深空物语蓝紫350",
    "productName": "深空物语蓝紫",
    "specCode": "日抛2片",
    "barcode": "6932364896736",
    "baseName": "深空物语蓝紫",
    "specificationToken": "日抛2片",
    "modelToken": "lenspop日抛",
    "degree": "350",
    "searchText": "日抛2片深空物语蓝紫350 深空物语蓝紫 lenspop日抛 350"
  }
]'></textarea>
            </div>

            <div class="bg-amber-50 border border-amber-200 rounded-lg p-4 mb-6">
                <div class="text-sm font-medium text-amber-800">覆盖提醒</div>
                <div class="text-sm text-amber-700 mt-1">
                    这个操作会调用整表替换接口，当前商品目录会被你提交的记录完全覆盖。
                </div>
            </div>

            <div class="flex justify-end">
                <button type="button" id="cancelBtn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-md mr-2 transition-all">
                    取消
                </button>
                <button type="button" id="submitReplaceBtn" class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-md transition-all">
                    提交替换
                </button>
            </div>
        </div>
    </div>

    <script src="dashboard-common.js"></script>
    <script src="product-catalog-api.js"></script>
</body>
</html>
