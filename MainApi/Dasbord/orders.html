<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单详情</title>
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#64748b',
                        success: '#22c55e',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#0ea5e9',
                        light: '#f8fafc',
                        dark: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .transition-all {
                transition-property: all;
                transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
                transition-duration: 300ms;
            }
            .shadow-hover {
                @apply transition-all duration-300;
            }
            .shadow-hover:hover {
                @apply shadow-lg transform -translate-y-1;
            }
            .readonly-field {
                @apply bg-gray-100 text-gray-700 cursor-not-allowed border-gray-300;
            }
            .editable-field {
                @apply bg-white text-gray-900 border-gray-300 focus:ring-2 focus:ring-primary focus:border-transparent;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex flex-col md:flex-row min-h-screen">
        <!-- 侧边栏 -->
        <aside id="dashboardSidebar" class="bg-dark text-white w-full md:w-64 flex-shrink-0"></aside>

        <!-- 主内容区 -->
        <main class="flex-grow p-6">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <button id="backBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-md flex items-center mb-2 transition-all">
                        <i class="fa fa-arrow-left mr-2"></i> 返回
                    </button>
                    <h2 class="text-2xl font-bold text-gray-800" id="groupTitle">订单详情</h2>
                </div>
                <div class="flex items-center">
                    <span class="text-gray-600 mr-2">今日日期:</span>
                    <span class="font-medium" id="currentDate"></span>
                </div>
            </div>

            <!-- 筛选和导出 -->
            <div class="bg-white p-4 rounded-lg shadow mb-6">
                <div class="flex flex-col md:flex-row gap-4 items-end">
                    <div>
                        <label for="startTime" class="block text-sm font-medium text-gray-700 mb-1">开始时间</label>
                        <input type="datetime-local" id="startTime" 
                            class="px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <div>
                        <label for="endTime" class="block text-sm font-medium text-gray-700 mb-1">结束时间</label>
                        <input type="datetime-local" id="endTime" 
                            class="px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                    </div>
                    <button id="filterBtn" class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-md transition-all">
                        <i class="fa fa-filter mr-2"></i> 筛选
                    </button>
                    <button id="resetBtn" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-4 py-2 rounded-md transition-all">
                        <i class="fa fa-refresh mr-2"></i> 重置
                    </button>
                    <div class="ml-auto">
                        <button id="exportBtn" class="bg-success hover:bg-green-600 text-white px-4 py-2 rounded-md transition-all">
                            <i class="fa fa-download mr-2"></i> 导出
                        </button>
                    </div>
                </div>
            </div>

            <!-- 订单表格 -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    订单ID
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    上传人账号
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    收件人
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    收货地址
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    产品信息
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    订单金额
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    快递单号
                                </th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
                                    操作
                                </th>
                            </tr>
                        </thead>
                        <tbody id="ordersTableBody" class="bg-white divide-y divide-gray-200">
                            <!-- 订单数据将通过JavaScript动态填充 -->
                        </tbody>
                    </table>
                </div>
                <div class="bg-white px-4 py-3 flex items-center justify-between border-t border-gray-200 sm:px-6">
                    <div class="flex-1 flex justify-between sm:hidden">
                        <button id="mobilePrevBtn" class="relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                            上一页
                        </button>
                        <button id="mobileNextBtn" class="ml-3 relative inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50">
                            下一页
                        </button>
                    </div>
                    <div class="hidden sm:flex-1 sm:flex sm:items-center sm:justify-between">
                        <div id="pageInfo">
                            <p class="text-sm text-gray-700">
                                显示 <span class="font-medium">0</span> 到 <span class="font-medium">0</span> 条，共 <span class="font-medium">0</span> 条记录
                            </p>
                        </div>
                        <div id="pagination"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 编辑订单模态框 -->
    <div id="orderModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl p-6 w-full max-w-2xl">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">编辑订单</h3>
                <button id="closeOrderModal" class="text-gray-500 hover:text-gray-700">
                    <i class="fa fa-times"></i>
                </button>
            </div>
            <form id="orderForm">
                <input type="hidden" id="orderId">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label for="editOrderId" class="block text-sm font-medium text-gray-700 mb-1">订单ID</label>
                        <input type="text" id="editOrderId" readonly
                            class="w-full px-4 py-2 border rounded-md readonly-field">
                    </div>
                    <div>
                        <label for="editUploader" class="block text-sm font-medium text-gray-700 mb-1">上传人账号</label>
                        <input type="text" id="editUploader" readonly
                            class="w-full px-4 py-2 border rounded-md readonly-field">
                    </div>
                    <div>
                        <label for="editRecipient" class="block text-sm font-medium text-gray-700 mb-1">收件人</label>
                        <input type="text" id="editRecipient" name="recipient" required readonly
                            class="w-full px-4 py-2 border rounded-md readonly-field">
                    </div>
                    <div>
                        <label for="editAddress" class="block text-sm font-medium text-gray-700 mb-1">收货地址</label>
                        <input type="text" id="editAddress" name="address" required readonly
                            class="w-full px-4 py-2 border rounded-md readonly-field">
                    </div>
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">产品信息</label>
                    <div id="productsContainer" class="border rounded-md p-4">
                        <!-- 产品信息将通过JavaScript动态填充 -->
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <div>
                        <label for="editAmount" class="block text-sm font-medium text-gray-700 mb-1">订单金额</label>
                        <input type="number" id="editAmount" name="amount" required min="0" step="0.01"
                            class="w-full px-4 py-2 border rounded-md editable-field">
                    </div>
                    <div>
                        <label for="editTrackingNumber" class="block text-sm font-medium text-gray-700 mb-1">快递单号</label>
                        <input type="text" id="editTrackingNumber" name="trackingNumber"
                            class="w-full px-4 py-2 border rounded-md editable-field">
                    </div>
                </div>
                <div class="flex justify-end">
                    <button type="button" id="cancelOrderBtn" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-md mr-2 transition-all">
                        取消
                    </button>
                    <button type="submit" class="bg-primary hover:bg-blue-600 text-white px-4 py-2 rounded-md transition-all">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="dashboard-common.js"></script>
    <script src="orders-api.js"></script>
</body>
</html>
