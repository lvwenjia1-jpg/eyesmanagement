services:
  mysql:
    image: mysql:8.4
    container_name: mainapi-mysql
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-mainapi}
      MYSQL_USER: ${MYSQL_USER:-test}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-1234}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u${MYSQL_USER:-test} -p${MYSQL_PASSWORD:-1234} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  mainapi:
    image: eyesmanagement/mainapi:latest
    build:
      context: ..
      dockerfile: MainApi/Dockerfile
    container_name: mainapi
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${MAINAPI_PORT:-8080}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: ${ASPNETCORE_URLS:-http://0.0.0.0:8080}
      TZ: ${TZ:-Asia/Shanghai}
      UseHttpsRedirection: ${UseHttpsRedirection:-false}
      ConnectionStrings__MainDb: ${ConnectionStrings__MainDb:-Server=mysql;Port=3306;Database=mainapi;User ID=test;Password=1234;SslMode=None;AllowPublicKeyRetrieval=True;CharSet=utf8mb4;}
      Jwt__Issuer: ${Jwt__Issuer:-MainApi}
      Jwt__Audience: ${Jwt__Audience:-MainApi.Clients}
      Jwt__SigningKey: ${Jwt__SigningKey:-MainApi_Local_Development_Signing_Key_Change_Before_Production_2026}
      Jwt__ExpiresMinutes: ${Jwt__ExpiresMinutes:-480}
      BootstrapAdmin__LoginName: ${BootstrapAdmin__LoginName:-admin}
      BootstrapAdmin__Password: ${BootstrapAdmin__Password:-123456}
      BootstrapAdmin__ErpId: ${BootstrapAdmin__ErpId:-ERP001}
      BootstrapAdmin__Role: ${BootstrapAdmin__Role:-admin}
      BootstrapAdmin__MachineCode: ${BootstrapAdmin__MachineCode:-DEMO-PC-001}
      BootstrapAdmin__MachineDescription: ${BootstrapAdmin__MachineDescription:-Docker Server}
      DashboardSeed__Enabled: ${DashboardSeed__Enabled:-true}
      DashboardSeed__ResetExistingData: ${DashboardSeed__ResetExistingData:-false}
      DashboardSeed__BusinessGroupCount: ${DashboardSeed__BusinessGroupCount:-6}
      DashboardSeed__OrdersPerGroup: ${DashboardSeed__OrdersPerGroup:-12}

volumes:
  mysql_data:
